<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Pending</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card: rgba(15, 23, 42, 0.82);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --danger: #fb7185;
      --ring: rgba(56, 189, 248, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 500px at 10% 10%, #0ea5e933, transparent 60%),
        radial-gradient(700px 450px at 90% 90%, #f43f5e33, transparent 55%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      padding: 24px;
    }

    .card {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid #334155;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      padding: 30px;
      backdrop-filter: blur(8px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #475569;
      border-radius: 999px;
      padding: 6px 12px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.2px;
      margin-bottom: 18px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 0 4px #fb71852b;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 2.8vw, 2.5rem);
      line-height: 1.2;
      letter-spacing: 0.3px;
    }

    p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .timer {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .unit {
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px 10px;
      text-align: center;
      background: #0b1220;
      box-shadow: inset 0 0 0 1px #1e293b;
    }

    .value {
      display: block;
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 24px var(--ring);
      margin-bottom: 4px;
    }

    .label {
      font-size: 0.8rem;
      letter-spacing: 1.2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .note {
      margin-top: 20px;
      border-left: 3px solid var(--danger);
      background: #7f1d1d22;
      padding: 12px 14px;
      border-radius: 10px;
      color: #fecdd3;
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .card { padding: 20px; }
      .timer { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">
      <span class="dot"></span>
      Payment Status: Pending
    </div>

    <h1>Payment has not been received yet.</h1>
    <p>
      This timer shows how much time has passed since <strong>1 March 2026</strong>.
      Please clear the pending payment as soon as possible.
    </p>

    <section class="timer" aria-label="Elapsed time since 1 March 2026">
      <div class="unit">
        <span class="value" id="days">0</span>
        <span class="label">Days</span>
      </div>
      <div class="unit">
        <span class="value" id="hours">0</span>
        <span class="label">Hours</span>
      </div>
      <div class="unit">
        <span class="value" id="minutes">0</span>
        <span class="label">Minutes</span>
      </div>
      <div class="unit">
        <span class="value" id="seconds">0</span>
        <span class="label">Seconds</span>
      </div>
    </section>

    <div class="note">
      Kindly process the payment immediately to avoid further delay.
    </div>
  </main>

  <script>
    const startDate = new Date("2026-03-01T00:00:00");

    const format = (value) => String(value).padStart(2, "0");

    function updateTimer() {
      const now = new Date();
      let diff = now - startDate;

      if (diff < 0) diff = 0;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = format(hours);
      document.getElementById("minutes").textContent = format(minutes);
      document.getElementById("seconds").textContent = format(seconds);
    }

    updateTimer();
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
